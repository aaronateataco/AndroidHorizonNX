<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!--
    Android Horizon launcher background. Rasterized once at startup via
    nanosvg (see main.cpp buildBackground()) into a static texture; the
    twinkling starfield is drawn separately, per-frame, on top of this in
    drawBackground() since that's genuine animation, not something a static
    raster should own.
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07061E"/>
      <stop offset="100%" stop-color="#1A1861"/>
    </linearGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34E686"/>
      <stop offset="100%" stop-color="#168C3E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#96FFC3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#96FFC3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky: near-black zenith fading to indigo at the horizon -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#sky)"/>

  <!-- soft glow above the horizon rim -->
  <rect x="0" y="500" width="1280" height="130" fill="url(#glow)"/>

  <!-- planet: a huge circle centered far below the frame, so only its top
       rim (~130px) is visible as a gently curved horizon -->
  <ellipse cx="640.0" cy="2790.0" rx="2200.0" ry="2200.0" fill="url(#planet)"/>
  <ellipse cx="640.0" cy="2790.0" rx="2200.0" ry="2200.0" fill="none" stroke="#96FFC3" stroke-width="5" opacity="0.95"/>
</svg>
