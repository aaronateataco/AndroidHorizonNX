name: Game compatibility report
description: Submit test results (with logs) for a game you tried on Android Horizon.
title: "[Compat] "
labels: ["compat-report"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing! This form is processed **automatically** — a bot grabs the APK, reads its package name/version/display name and icon straight out of it, checks it's actually a game, runs your logs through an automated pass/fail/performance analysis, and either adds it to the [compatibility page](https://androidhorizon.github.io/website/compatibility.html) or explains why it couldn't. This issue will be **closed and locked automatically** once that's done — it's a data submission, not a discussion thread. If you want to discuss something, please open a separate issue.

        The game's name, package, and version are read directly from the APK file, not typed in, so they can't drift out of sync with what you actually tested.

        You need **all three** log files from `sdmc:/AndroidHorizonNX/`:
        - `launcher_log.txt`
        - `compat_log.txt`
        - `log.txt` (from `sdmc:/AndroidHorizonNX/<package>/log.txt`, written by the Translation Core)

  - type: textarea
    id: apk_url
    attributes:
      label: The APK
      description: >-
        Easiest: paste a direct download link to the .apk you tested.
        GitHub won't accept a raw .apk drag-and-drop upload (.apk isn't on
        its allowed-file-types list) — if you'd rather attach the file
        itself than link to it, rename it to end in .zip first (an APK is
        a real ZIP file under the hood, so this just works) and drag that
        into this box instead. Split/.xapk packages aren't supported yet.
      placeholder: https://example.com/path/to/game.apk (or a dropped-in .zip-renamed upload)
    validations:
      required: true

  - type: input
    id: source_site
    attributes:
      label: Where did this APK come from?
      description: The site/store you downloaded it from, e.g. "APKMirror", "APKPure", "official developer site"
      placeholder: APKMirror
    validations:
      required: true

  - type: textarea
    id: launcher_log
    attributes:
      label: launcher_log.txt
      description: >-
        Paste the full contents of sdmc:/AndroidHorizonNX/launcher_log.txt —
        or, if it's too long to paste (GitHub caps this box at 65536
        characters), drag the .txt file itself into this box instead.
      render: text
    validations:
      required: true

  - type: textarea
    id: compat_log
    attributes:
      label: compat_log.txt
      description: >-
        Paste the full contents of sdmc:/AndroidHorizonNX/compat_log.txt —
        or, if it's too long to paste (GitHub caps this box at 65536
        characters — compat_log.txt especially tends to run long), drag the
        .txt file itself into this box instead.
      render: text
    validations:
      required: true

  - type: textarea
    id: core_log
    attributes:
      label: log.txt (Translation Core)
      description: >-
        Paste the full contents of sdmc:/AndroidHorizonNX/<package>/log.txt —
        or, if it's too long to paste (GitHub caps this box at 65536
        characters), drag the .txt file itself into this box instead.
      render: text
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else worth knowing?
      description: Optional — what you saw on screen, what worked, what didn't, controller used, docked/handheld, etc.
    validations:
      required: false
