name: Process compatibility report

# Fired by the Cloudflare Worker relaying the website's submission form
# (androidhorizon.github.io/website/submit.html) — it writes the submission
# to compat-reports/pending/<id>/ via the GitHub Contents API, then POSTs
# this repository_dispatch event with just the submission id as payload.
# There's no GitHub issue involved anymore: submitting doesn't need a
# GitHub account, and there's nowhere for GitHub's issue-form field size
# limits to bite — the log files are plain files in a git repo, not text
# crammed into a form field.
on:
  repository_dispatch:
    types: [compat-submission]

permissions:
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install androguard

      - name: Run automated analysis + publish
        env:
          # Required (not optional here, unlike the old issue-based flow) —
          # this workflow needs to both read the queued submission out of
          # compat-reports and push the result back, and compat-reports is a
          # different repo than the one this workflow runs in, so the
          # default per-run GITHUB_TOKEN can't do either.
          ORG_PAT: ${{ secrets.ORG_PAT }}
          SUBMISSION_ID: ${{ github.event.client_payload.submission_id }}
        run: python3 .github/scripts/process_compat_submission.py
