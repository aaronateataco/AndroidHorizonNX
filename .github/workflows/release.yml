name: Build & Release

# Manual only — never runs on push/PR. GitHub already restricts who can
# dispatch a workflow manually to accounts with WRITE access to the repo
# (i.e. org members added as collaborators/teams with that role) — that's
# the actual enforcement point, native to GitHub, not something this
# workflow needs to reimplement.
#
# (An earlier version of this workflow added its own explicit org-membership
# check on top of that. Removed it after the first real run: the workflow's
# auto-generated GITHUB_TOKEN can't read org membership visibility — a
# private membership reads identically to "not a member" through that API —
# so the check failed even for a legitimate org owner. GitHub's native
# write-access gating was already doing the actual job correctly.)
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v0.2.0-testing-alpha (leave blank to auto-bump the patch number)"
        required: false
        type: string
      prerelease:
        description: "Mark as a pre-release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout launcher (Viridite)
        uses: actions/checkout@v4
        with:
          path: launcher
          fetch-depth: 0

      - name: Checkout Translation Core
        uses: actions/checkout@v4
        with:
          repository: Viridite/VNX-Translation-Core
          path: core
          fetch-depth: 0
          # The Unity runtime (AHNX-Unity-Runtime) is a submodule compiled into
          # the Core — pull it so its src/ is present for the build.
          submodules: recursive

      - name: Fetch org contributors for in-app credits
        env:
          # ORG_PAT is optional: a classic/fine-grained PAT with read access
          # across the whole org, set as a repo secret if/when private repos
          # (like `website`) should be included in the in-app credits too.
          # Falls back to the workflow's own auto-generated token, which can
          # only see PUBLIC repos in the org — private ones are silently
          # skipped (with a warning in the log) rather than failing the build.
          GH_TOKEN: ${{ secrets.ORG_PAT || secrets.GITHUB_TOKEN }}
        run: |
          fetch_repo_contributors() {
            repo="$1"; title="$2"
            resp=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/Viridite/$repo/contributors?per_page=100")
            if echo "$resp" | grep -q '"message"'; then
              echo "::warning::Couldn't fetch contributors for $repo (private + no ORG_PAT secret?) — skipping" >&2
              return
            fi
            echo "#$title"
            echo "$resp" | grep -E '"login"|"contributions"' | paste -d' ' - - \
              | sed -E 's/.*"login": *"([^"]+)".*"contributions": *([0-9]+).*/\1:\2/'
          }
          fetch_testers() {
            # Community testers aren't git contributors to any repo — they're
            # the people who submitted a compat report via the website form
            # (github_username is optional there, so plenty of entries have
            # no name at all). Pull the dedup'd, non-blank submitter list
            # straight from the same games.json the website's Credits page
            # reads. Skip the category entirely if nobody's submitted a name
            # yet, rather than showing an empty heading in the About screen.
            resp=$(curl -s "https://raw.githubusercontent.com/Viridite/compat-reports/main/data/games.json")
            names=$(echo "$resp" | grep -o '"submitted_by": *"[^"]*"' \
              | sed -E 's/.*"submitted_by": *"([^"]*)"/\1/' | grep -v '^$' | sort -u)
            if [ -n "$names" ]; then
              echo "#Testers"
              echo "$names"
            fi
          }
          {
            fetch_repo_contributors "Viridite" "Launcher (Viridite)"
            fetch_repo_contributors "VNX-Translation-Core" "Translation Core"
            fetch_repo_contributors "website" "Website"
            fetch_testers
          } > launcher/romfs/contributors.txt
          echo "--- contributors.txt ---"
          cat launcher/romfs/contributors.txt

      - name: Fetch contributor/tester avatars for in-app credits
        run: |
          # One small PNG per unique name baked into the NRO — same
          # "bundled, not fetched at runtime" approach as the existing
          # About-screen avatar (see avatar.cpp). github.com/<user>.png is a
          # stable public shortcut to a user's current avatar, no API/auth
          # needed.
          mkdir -p launcher/romfs/avatars
          grep -v '^#' launcher/romfs/contributors.txt | cut -d: -f1 | sort -u | while read -r name; do
            [ -z "$name" ] && continue
            curl -sL --max-time 15 -o "launcher/romfs/avatars/${name}.png" \
              "https://github.com/${name}.png?size=64" || true
          done
          echo "--- avatars fetched ---"
          ls -la launcher/romfs/avatars/

      - name: Build launcher
        run: docker run --rm -v ${{ github.workspace }}/launcher:/project -w /project devkitpro/devkita64:latest make

      - name: Build Translation Core (x64)
        run: docker run --rm -v ${{ github.workspace }}/core:/project -w /project devkitpro/devkita64:latest make

      - name: Build Translation Core (x32, placeholder)
        run: docker run --rm -v ${{ github.workspace }}/core/core32:/project -w /project devkitpro/devkita64:latest make

      - name: Assemble SD-card layout
        run: |
          mkdir -p dist/Viridite
          cp launcher/Viridite.nro dist/Viridite.nro
          cp core/Viridite-Translation-Core-x64.nro dist/Viridite/Viridite-Translation-Core-x64.nro
          cp core/core32/Viridite-Translation-Core-x32.nro dist/Viridite/Viridite-Translation-Core-x32.nro
          (cd dist && zip -r ../Viridite-sdcard.zip .)

      - name: Determine release tag
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            LAST_TAG=$(cd launcher && git tag --sort=-creatordate | head -1)
            if [ -z "$LAST_TAG" ]; then
              TAG="v0.1.1-testing-alpha"
            else
              # Third number is the patch (v<major>.<minor>.<patch>-...).
              # An earlier version of this grabbed the SECOND number (the
              # minor) — which only looked right while minor and patch
              # happened to be equal (v0.1.1 → "bump 1 → 2" → v0.1.2), then
              # collided with the existing tag on the very next run
              # (v0.1.2 → "bump 1 → 2" → v0.1.2 again).
              NUM=$(echo "$LAST_TAG" | grep -oE '[0-9]+' | sed -n '3p')
              MAJOR_MINOR=$(echo "$LAST_TAG" | grep -oE '^v[0-9]+\.[0-9]+')
              NEXT=$((NUM + 1))
              TAG="${MAJOR_MINOR}.${NEXT}-testing-alpha"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing as $TAG"

      - name: Generate in-depth changelog
        id: changelog
        run: |
          LAUNCHER_LAST_TAG=$(cd launcher && git tag --sort=-creatordate | head -1)
          {
            echo "## Viridite — ${{ steps.ver.outputs.tag }}"
            echo
            echo "Automated build via GitHub Actions. Bundles the launcher + both Translation Core binaries — drag \`Viridite.nro\` and the \`Viridite/\` folder from \`Viridite-sdcard.zip\` straight onto your SD card's \`/switch/\` folder."
            echo
            echo "### Launcher (Viridite) changes"
            echo
            if [ -n "$LAUNCHER_LAST_TAG" ]; then
              (cd launcher && git log "${LAUNCHER_LAST_TAG}..HEAD" --pretty=format:"- %s (%h, %ad)" --date=short)
            else
              (cd launcher && git log --pretty=format:"- %s (%h, %ad)" --date=short)
            fi
            echo
            echo
            echo "### AHNX-Translation-Core changes (most recent commits)"
            echo
            (cd core && git log --pretty=format:"- %s (%h, %ad)" --date=short -30)
            echo
            echo
            echo "### Build info"
            echo
            echo "- Launcher commit: \`$(cd launcher && git rev-parse HEAD)\`"
            echo "- Translation Core commit: \`$(cd core && git rev-parse HEAD)\`"
            echo "- Built: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "- Triggered by: @${{ github.actor }}"
          } > CHANGELOG.md
          cat CHANGELOG.md

      - name: Tag the launcher repo
        working-directory: launcher
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only the bundled SD-card zip is published — the loose x64/x32
          # NROs are build intermediates, not something someone should grab
          # individually and drop in the wrong place. One asset, one clear
          # "drag this onto your SD card" story.
          PRERELEASE_FLAG="--prerelease"
          if [ "${{ inputs.prerelease }}" = "false" ]; then PRERELEASE_FLAG=""; fi
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file CHANGELOG.md \
            $PRERELEASE_FLAG \
            Viridite-sdcard.zip
